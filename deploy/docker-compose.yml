version: '3.8'

services:
  # ================================================================
  # MySQL: 使用本地安装的 MySQL，不走 Docker
  # 请确保本地 MySQL 已运行，并执行：
  #   mysql -u root -p < deploy/mysql/init.sql
  # ================================================================

  # ================================================================
  # Prometheus
  # ================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: loadflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    # macOS: 用 host.docker.internal 访问宿主机上运行的 Go demo
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ================================================================
  # Grafana
  # ================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: loadflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/loadflow.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
